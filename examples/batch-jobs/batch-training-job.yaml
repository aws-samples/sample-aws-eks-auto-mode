apiVersion: v1
kind: Namespace
metadata:
  name: batch-jobs
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ml-training-example
  namespace: batch-jobs
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 2
  template:
    metadata:
      annotations:
        karpenter.sh/do-not-disrupt: "true"
      labels:
        app: ml-training
    spec:
      restartPolicy: OnFailure
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: training
          image: public.ecr.aws/nvidia/cuda:12.4.0-base-ubuntu22.04
          command: ["sh", "-c", "echo 'Simulating 2-hour training job...' && sleep 7200"]
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
